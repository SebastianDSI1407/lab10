<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: yellow;
            padding: 20px;
            display: none;
        }

        span:hover + div {
            display: block;
        }
    </style>
</head>
<body>
    <span>¡Hover sobre mi!</span>
    <div>Lo mostrare al pasar el cursor</div>
</body>
</html>
