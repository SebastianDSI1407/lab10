<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f0f0;
        }
        .contenedor{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .item{
            text-align: center;
        }
        img{
            width: 320px;
            height: 220px;
            object-fit: cover;
        }
        .opacidad02{
            opacity: 0.2;
        }
        .opacidad05{
            opacity: 0.5;
        }
        .opacidad10{
            opacity: 1;
        }
        p{
            font-size: 24px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="item">
            <img src="paisaje.jpg" class="opacidad02" alt="Paisaje">
            <p>opacidad 0.2</p>
        </div>

        <div class="item">
            <img src="paisaje.jpg" class="opacidad05" alt="Paisaje">
            <p>opacidad 0.5</p>
        </div>

        <div class="item">
            <img src="paisaje.jpg" class="opacidad10" alt="Paisaje">
            <p>opacidad 1.0<br>(predeterminada)</p>
        </div>
    </div>
</body>
</html>
