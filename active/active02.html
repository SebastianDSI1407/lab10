<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
            background-color: #04AA6D;
            border: none;
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            cursor: pointer;
        }
        button:active {
            background-color: pink;
        }
    </style>
</head>
<body>
    <h1>Demostracion de :active</h1>
    <p>La pseudoclase :active aplica estilos al boton activo:</p>
    <button>
        haz clic aquí!
    </button>
</body>
</html>
