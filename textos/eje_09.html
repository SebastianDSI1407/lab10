<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @font-face {
            font-family: 'Open Sans';
            src: url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');
        }
        body {
            font-family: 'Open Sans', sans-serif;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Bienvenido a CSS3 Tipografía</h1>
    <p>
        Este párrafo usa la fuente 'Open Sans' importada con @font-face desde Google Fonts.
    </p>
</body>
</html>
